<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Финал</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        font-family: Arial, sans-serif;
    }

    .btn {
        padding: 20px 40px;
        font-size: 20px;
        color: white;
        background: linear-gradient(45deg, #ff416c, #ff4b2b);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
    }

    .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.3);
        transition: 0.5s;
    }

    .btn:hover::before {
        left: 100%;
    }
</style>
</head>
<body>
  <a href="index.html">
	<button class="btn">🔁 Начать заново</button>
  </a>


</body>
</html>

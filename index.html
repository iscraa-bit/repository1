<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Искры</title>
<style>
    body {
        margin: 0;
        background: #2b2b2b;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    button {
        padding: 20px 40px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        background: #444;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        z-index: 2;
    }

    button:hover {
        background: #666;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }
</style>
</head>
<body>

<button id="sparkBtn">Нажми</button>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let sparks = [];

function createSparks(x, y) {
    for (let i = 0; i < 50; i++) {
        sparks.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 100
        });
    }
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = sparks.length - 1; i >= 0; i--) {
        let s = sparks[i];

        s.x += s.vx;
        s.y += s.vy;
        s.life--;

        ctx.fillStyle = "orange";
        ctx.fillRect(s.x, s.y, 3, 3);

        if (s.life <= 0) {
            sparks.splice(i, 1);
        }
    }

    requestAnimationFrame(update);
}

document.getElementById("sparkBtn").addEventListener("click", (e) => {
    const rect = e.target.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;
    createSparks(x, y);
});

update();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>

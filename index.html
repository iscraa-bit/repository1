<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Искры</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;

        /* ФОНОВАЯ КАРТИНКА */
        background-image: url("milky-way-starry-sky-night-sky-star-956981.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    /* затемнение, чтобы искры лучше выглядели */
    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 0;
    }

    button {
        padding: 20px 40px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        background: #444;
        color: white;
        cursor: pointer;
        z-index: 2;
    }

    button:hover {
        background: #666;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }
</style>
</head>
<body>

<button id="sparkBtn">Нажми</button>
<canvas id="canvas"></canvas>
<a href="copy1.html">
  <button>Go to Page 2</button>
</a>
    
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let sparks = [];

function createSparks(x, y) {
    for (let i = 0; i < 80; i++) {
        sparks.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 2,
            vy: Math.random() * -3,
            gravity: 0.08 + Math.random() * 0.05,
            life: 120,
            size: Math.random() * 1.5 + 1,
            flicker: Math.random() * 0.5 + 0.75
        });
    }
}

function drawSpark(s) {
    const flicker = s.flicker + (Math.random() - 0.5) * 0.1;

    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 6);
    glow.addColorStop(0, `rgba(255,220,120,${0.4 * flicker})`);
    glow.addColorStop(1, "rgba(255,100,0,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255,200,80,${flicker})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = sparks.length - 1; i >= 0; i--) {
        let s = sparks[i];

        s.vy += s.gravity;
        s.x += s.vx;
        s.y += s.vy;

        s.life--;

        drawSpark(s);

        if (s.life <= 0 || s.y > canvas.height) {
            sparks.splice(i, 1);
        }
    }

    requestAnimationFrame(update);
}

document.getElementById("sparkBtn").addEventListener("click", (e) => {
    const rect = e.target.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;
    createSparks(x, y);
});

update();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>

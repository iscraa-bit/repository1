<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Главная</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    .container {
        animation: fadeIn 2s ease;
    }

    h1 {
        font-size: 50px;
        margin-bottom: 20px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #ffffff;
        color: #2a5298;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>
<body>

<div class="container">
    <h1>Добро пожаловать</h1>
    <a href="copy2.html">
	<button>Дальше →</button>
    </a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карточка</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #000428, #004e92);
        font-family: Arial, sans-serif;
    }

    .card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        color: white;
        text-align: center;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h2 {
        margin-bottom: 15px;
    }

    p {
        opacity: 0.8;
    }

    button {
        margin-top: 20px;
        padding: 10px 25px;
        border: none;
        border-radius: 8px;
        background: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="card">
    <h2>Красивый блок</h2>
    <p>Минимализм + стеклянный эффект</p>
    <a href="copy3.html">
	<button>Дальше →</button>
    </a>
</div>

</body>
</html>
